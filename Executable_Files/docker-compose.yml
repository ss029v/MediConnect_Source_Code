version: '3.8'

services:
  db:
    image: mysql:8.0
    container_name: mediconnect-mysql
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: hospital_db
    ports:
      - "3307:3306"
    volumes:
      - ./database_schema.sql:/docker-entrypoint-initdb.d/init.sql
    networks:
      - mediconnect-network

  app:
    build: .
    container_name: mediconnect-app
    restart: always
    ports:
      - "8080:8080"
    depends_on:
      - db
    environment:
      - DB_URL=jdbc:mysql://db:3306/hospital_db
      - DB_USER=root
      - DB_PASSWORD=Zx@12345
    networks:
      - mediconnect-network

networks:
  mediconnect-network:
    driver: bridge